<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 性格深度测试</title>
  <style>
    :root {
      --bg: #f8f9fc;
      --card: #ffffff;
      --accent: #6366f1;
      --accent-light: #eef2ff;
      --accent-dark: #4f46e5;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --green-bg: #f0fdf4;
      --green-border: #bbf7d0;
      --green-text: #166534;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.06), 0 4px 10px rgba(0,0,0,0.03);
      --radius: 14px;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: flex-start;
      padding: 24px 16px 80px;
    }

    .app {
      width: 100%; max-width: 640px;
      display: flex; flex-direction: column; gap: 20px;
    }

    /* ── 头部 ── */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 4px;
    }
    .header h1 {
      font-size: 26px; font-weight: 800; margin: 0;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-subtitle {
      font-size: 14px; color: var(--text-muted); margin: 2px 0 0 4px;
    }
    .query-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; font-size: 14px; font-weight: 600;
      background: var(--card); color: var(--accent);
      border: 1.5px solid var(--border); border-radius: 10px;
      text-decoration: none; white-space: nowrap;
      transition: all 0.2s;
    }
    .query-link:hover { border-color: var(--accent); background: var(--accent-light); }

    /* ── 进度 ── */
    .progress-wrap { display: flex; flex-direction: column; gap: 8px; }
    .progress-info { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); }
    .progress-track {
      height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 3px;
      transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dimension-tags {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .dim-tag {
      font-size: 12px; font-weight: 700; padding: 3px 10px;
      border-radius: 99px;
      background: var(--accent-light); color: var(--accent-dark);
      opacity: 0.5; transition: opacity 0.3s;
    }
    .dim-tag.current { opacity: 1; }
    .dim-tag.done { opacity: 0.85; background: #d1fae5; color: #065f46; }

    /* ── 题目卡片 ── */
    .card-stage {
      position: relative; min-height: 320px;
    }
    .question-card {
      position: absolute; width: 100%;
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid var(--border);
      padding: 28px;
      opacity: 0; transform: translateX(40px); pointer-events: none;
      transition: opacity var(--transition), transform var(--transition);
    }
    .question-card.active {
      opacity: 1; transform: translateX(0); pointer-events: auto;
      position: relative; z-index: 1; box-shadow: var(--shadow-lg);
    }
    .question-card.exit-left { opacity: 0; transform: translateX(-40px); }

    .q-num {
      font-size: 13px; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    .q-text {
      font-size: 19px; font-weight: 700; line-height: 1.55; margin: 0 0 24px;
      color: var(--text);
    }

    /* ── 选项 ── */
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 10px;
      border: 1.5px solid var(--border); background: #fafbfc;
      cursor: pointer; transition: all 0.2s;
      user-select: none;
    }
    .option:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .option.selected {
      background: var(--accent-light); border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .option-radio {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid #cbd5e1; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .option.selected .option-radio {
      border-color: var(--accent); background: var(--accent);
    }
    .option.selected .option-radio::after {
      content: ''; width: 7px; height: 7px; background: #fff; border-radius: 50%;
    }
    .option-text { font-size: 15px; line-height: 1.4; }
    .option-label {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .option.selected .option-label { color: var(--accent-dark); }
    input[type="radio"] { display: none; }

    /* ── 底部控制 ── */
    .controls {
      display: flex; gap: 12px; align-items: center;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 13px 20px; font-size: 15px; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-outline {
      background: var(--card); color: var(--text-muted);
      border: 1.5px solid var(--border);
    }
    .btn-outline:hover:not(:disabled) { border-color: #94a3b8; color: var(--text); }
    .btn-outline:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary {
      background: var(--accent); color: #fff; flex: 1;
      box-shadow: 0 2px 8px rgba(99,102,241,0.25);
    }
    .btn-primary:hover { background: var(--accent-dark); }
    .key-hint {
      font-size: 12px; color: var(--text-muted); margin-left: auto;
    }
    .key-hint kbd {
      display: inline-block; padding: 2px 7px; font-size: 11px;
      background: #f1f5f9; border: 1px solid var(--border);
      border-radius: 4px; font-family: inherit;
    }

    /* ── 提交区域 ── */
    #submitArea {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); border: 1px solid var(--border);
      padding: 28px; display: none; flex-direction: column; gap: 16px;
      animation: fadeInUp 0.4s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-weight: 700; font-size: 15px; }
    .input-group input {
      padding: 13px 16px; font-size: 16px; border: 1.5px solid var(--border);
      border-radius: 10px; outline: none; transition: border 0.2s;
    }
    .input-group input:focus { border-color: var(--accent); }

    /* ── 结果卡片 ── */
    #result {
      background: var(--green-bg); border: 1px solid var(--green-border);
      border-radius: var(--radius); padding: 32px; text-align: center;
      display: none; animation: fadeInUp 0.5s ease;
    }
    #result h2 { color: var(--green-text); font-size: 22px; margin: 0 0 8px; }
    #result .type-badge {
      display: inline-block; font-size: 36px; font-weight: 900;
      letter-spacing: 4px; color: var(--accent-dark);
      background: var(--accent-light); padding: 8px 24px;
      border-radius: 12px; margin: 12px 0;
    }
    #result p { color: var(--text-muted); margin: 8px 0; }
    #result a { color: var(--accent); font-weight: 600; }

    /* ── 响应式 ── */
    @media (max-width: 480px) {
      .header h1 { font-size: 22px; }
      .q-text { font-size: 17px; }
      .question-card { padding: 20px; }
      .option { padding: 12px 14px; }
      .controls { flex-wrap: wrap; }
      .key-hint { display: none; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- ── 头部 ── -->
  <div class="header">
    <div>
      <h1>MBTI 性格测试</h1>
      <div class="header-subtitle">了解自己，发现优势</div>
    </div>
    <a href="/query.html" class="query-link">🔍 查询结果</a>
  </div>

  <!-- ── 进度条 ── -->
  <div class="progress-wrap" id="progressWrap">
    <div class="dimension-tags" id="dimTags">
      <span class="dim-tag">E/I</span>
      <span class="dim-tag">S/N</span>
      <span class="dim-tag">T/F</span>
      <span class="dim-tag">J/P</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressBar"></div>
    </div>
    <div class="progress-info" id="progressInfo">
      <span id="progressLabel">第 1 / 32 题</span>
      <span id="progressPercent">0%</span>
    </div>
  </div>

  <form id="testForm">
    <!-- ── 题目展示区 ── -->
    <div class="card-stage" id="questions"></div>

    <!-- ── 控制按钮 ── -->
    <div class="controls" id="controlBtns">
      <button type="button" class="btn btn-outline" id="prevBtn" onclick="goPrev()" disabled>← 上一题</button>
      <button type="button" class="btn btn-primary" id="nextBtn" onclick="goNext()">下一题 →</button>
      <span class="key-hint">按 <kbd>←</kbd><kbd>→</kbd> 切换</span>
    </div>

    <!-- ── 提交区域 ── -->
    <div id="submitArea">
      <div class="input-group">
        <label>填写昵称（用于保存和查询结果）</label>
        <input type="text" id="nameInput" placeholder="输入你的昵称" autocomplete="off">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">提交测试</button>
    </div>
  </form>

  <!-- ── 结果区域 ── -->
  <div id="result">
    <h2>🎉 测试完成！</h2>
    <div class="type-badge" id="mbtiType"></div>
    <p>结果已保存，随时可前往 <a href="/query.html">查询页面</a> 查看详情。</p>
  </div>
</div>

<script>
  // —— 32 题：维度交错排列 + 反向计分（rev），消除惯性作答 ——
  // 每 4 题覆盖 E/I·S/N·T/F·J/P 各一题；各维度 4 正向 + 4 反向
  // rev:true → A 选项描述的是该维度的"另一端"，计分时自动取反
  const questions = [
    /* 第 1 轮 — 前半正向建立基线，后半反向 */
    { text: "周末晚上接到朋友聚会邀请，", a: "欣然前往，期待认识新面孔", b: "有些犹豫，更想安静地待着", dim: "EI" },
    { text: "阅读一份行业报告时，你更关注", a: "数据是否详实、案例是否可靠", b: "趋势判断是否新颖、有启发性", dim: "SN" },
    { text: "同事因失误被当众批评后情绪低落，你首先", a: "和ta一起复盘，找出具体的改进点", b: "先安抚ta的情绪，让ta感到被理解", dim: "TF" },
    { text: "距离重要项目截止还有两周，你通常", a: "制定详细时间表，严格按节点推进", b: "充分收集信息，在推进中逐步明确", dim: "JP" },

    { text: "在热闹聚会上待了两小时后，你感到", a: "精力消耗殆尽，渴望回到安静空间", b: "仍然兴致高昂，想继续和人交流", dim: "EI", rev: true },
    { text: "朋友向你描述他的创业点子，你最自然的反应是", a: "追问背后的逻辑和更大的想象空间", b: "问他打算第一步具体怎么做", dim: "SN", rev: true },
    { text: "做团队绩效评估时，你最看重的是", a: "这个人的努力程度和进步幅度", b: "这个人的产出质量和可量化效率", dim: "TF", rev: true },
    { text: "意外收到一笔奖金，你的处理方式是", a: "先放着，看看有没有特别想买的东西", b: "按比例分配：储蓄、投资和适度消费", dim: "JP", rev: true },

    /* 第 2 轮 */
    { text: "头脑中冒出一个新想法时，你的第一反应是", a: "找人讨论，在交流中把它想清楚", b: "先独自思考，形成完整想法之后再说", dim: "EI" },
    { text: "公司要推出一款新产品，你更希望参与", a: "在现有产品基础上做扎实的迭代优化", b: "探索一个完全不同于现有方向的新品类", dim: "SN" },
    { text: "朋友向你倾诉一段失败的亲密关系，你倾向于", a: "帮ta理性分析这段关系中双方的互动模式", b: "陪在ta身边，让ta感觉到有人在乎", dim: "TF" },
    { text: "面对多任务并行的一天，你更习惯", a: "列出优先级清单，完成一项划掉一项", b: "哪项任务最有灵感就先做哪项", dim: "JP" },

    { text: "在一个全是陌生人的社交场合中，你通常", a: "先观察环境，等别人来主动搭话", b: "主动与人攀谈，快速融入氛围", dim: "EI", rev: true },
    { text: "回忆起印象深刻的旅行，你首先想起的是", a: "当时弥漫的那种难以言喻的独特气氛", b: "具体去了哪些地方、吃了什么东西", dim: "SN", rev: true },
    { text: "一个决策逻辑正确但会伤害少数人感情——你的态度是", a: "暂缓执行，先寻找更柔和的替代方案", b: "坚持执行，事后再做安抚和解释", dim: "TF" },
    { text: "你周末打扫房间的方式更接近", a: "碰到哪里觉得该收拾了就动手，比较随性", b: "分区规划，按顺序逐一彻底清理", dim: "JP", rev: true },

    /* 第 3 轮 */
    { text: "团队会议陷入僵局、没人说话时，你倾向于", a: "打破沉默，提出一个新的讨论方向", b: "耐心等待，让更合适的发言时机自然出现", dim: "EI" },
    { text: "向新同事介绍团队工作流程，你会", a: "用具体的操作步骤和实际案例来说明", b: "先解释整套流程背后的设计理念和原则", dim: "SN" },
    { text: "朋友请求你做一件会影响你自身利益的事，你会", a: "先客观评估这件事合不合理，再做决定", b: "考虑到交情，能帮就尽量帮", dim: "TF" },
    { text: "安排一次全家出行，你的风格是", a: "提前定好路线、住宿和每日大致行程", b: "确定大致方向，细节到了之后再说", dim: "JP" },

    { text: "独自度过一整天后，你通常会", a: "感到放松自在，精力得到充分恢复", b: "觉得少了点什么，想找人互动一下", dim: "EI", rev: true },
    { text: "评估候选人是否适合某个岗位时，你更依赖", a: "面试中感受到的潜力、可塑性和文化契合度", b: "简历上展示的具体经验、技能和过往业绩", dim: "SN", rev: true },
    { text: "与做事风格截然不同的同事产生摩擦，你首先会", a: "尝试理解对方的感受和出发点", b: "明确职责边界，用规则来减少未来的摩擦", dim: "TF", rev: true },
    { text: "你的手机相册更接近哪种状态", a: "照片积攒了很多，很久才会整理一次", b: "定期整理分类，始终保持有条理", dim: "JP", rev: true },

    /* 第 4 轮 */
    { text: "需要说服同事支持你的方案，你的策略是", a: "组织一场面对面会议，当面阐述你的想法", b: "写一份详尽文档，让他自己阅读思考", dim: "EI" },
    { text: "学习一门复杂的新技能（如编程或乐器），你认为最重要的是", a: "扎实地练好每一个基础动作", b: "理解整体框架，再逐步填充细节", dim: "SN" },
    { text: "面对一个裁员才能扭亏的业务决策，你更纠结的是", a: "怎样裁才对公司长期发展最有利", b: "怎样最小化对被裁员工的实际影响", dim: "TF" },
    { text: "早晨起床，想到今天要做的事，你更倾向于", a: "按昨晚列好的计划开始行动", b: "根据今天的状态和心情灵活安排", dim: "JP" },

    { text: "如果连续安排了多个周末社交活动，你会", a: "感到疲惫，需要留出一些空白周末", b: "觉得充实，期待每一次相聚", dim: "EI", rev: true },
    { text: "导师说「这个方向很有前景」，你首先想知道", a: "它可能带来怎样的模式创新和行业变革", b: "有没有具体的成功案例和数据支撑", dim: "SN", rev: true },
    { text: "有人按时完成但品质平平，有人延期但品质出色——你更欣赏", a: "后者，追求卓越值得等待", b: "前者，守信和可靠是基本素养", dim: "TF", rev: true },
    { text: "外出用餐选择餐厅时，你通常是", a: "边走边看，凭感觉临时决定", b: "提前查好评价和菜单再决定", dim: "JP", rev: true }
  ];

  const TOTAL = questions.length;
  let currentIdx = 0;
  const API_BASE = window.location.origin;

  // 维度名称映射
  const dimNames = { EI: "E/I 外向·内向", SN: "S/N 实感·直觉", TF: "T/F 思考·情感", JP: "J/P 判断·感知" };

  // ── 渲染题目 ──
  const qDiv = document.getElementById('questions');

  questions.forEach((q, idx) => {
    const div = document.createElement('div');
    div.className = `question-card${idx === 0 ? ' active' : ''}`;
    div.id = `qBlock${idx}`;
    div.innerHTML = `
      <div class="q-num">问题 ${idx + 1} · ${dimNames[q.dim]}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        <div class="option" data-value="2" onclick="selectOption(this, ${idx})">
          <span class="option-radio"></span>
          <span class="option-text"><span class="option-label">A</span> ${q.a}</span>
        </div>
        <div class="option" data-value="1" onclick="selectOption(this, ${idx})">
          <span class="option-radio"></span>
          <span class="option-text"><span class="option-label">偏 A</span></span>
        </div>
        <div class="option" data-value="0" onclick="selectOption(this, ${idx})">
          <span class="option-radio"></span>
          <span class="option-text"><span class="option-label">中立</span></span>
        </div>
        <div class="option" data-value="-1" onclick="selectOption(this, ${idx})">
          <span class="option-radio"></span>
          <span class="option-text"><span class="option-label">偏 B</span></span>
        </div>
        <div class="option" data-value="-2" onclick="selectOption(this, ${idx})">
          <span class="option-radio"></span>
          <span class="option-text"><span class="option-label">B</span> ${q.b}</span>
        </div>
      </div>
    `;
    qDiv.appendChild(div);
  });

  // 隐藏的 radio 用于存储选中值
  const hiddenRadios = {};
  questions.forEach((_, idx) => {
    const radio = document.createElement('input');
    radio.type = 'radio'; radio.name = `q${idx}`; radio.style.display = 'none';
    hiddenRadios[idx] = radio;
    qDiv.appendChild(radio);
  });

  // ── 选项点击 ──
  function selectOption(el, idx) {
    const parent = el.parentElement;
    parent.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');

    // 同步隐藏 radio
    hiddenRadios[idx].value = el.dataset.value;
    hiddenRadios[idx].checked = true;

    // 非最后一题自动前进
    if (idx === TOTAL - 1) {
      setTimeout(() => {
        document.getElementById('controlBtns').style.display = 'none';
        document.getElementById('questions').style.display = 'none';
        document.getElementById('submitArea').style.display = 'flex';
        updateProgress(TOTAL);
        updateDimTags(TOTAL);
        // 滚动到提交区
        document.getElementById('submitArea').scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 350);
      return;
    }

    if (idx === currentIdx && currentIdx < TOTAL - 1) {
      setTimeout(() => goNext(), 350);
    }
  }

  // ── 切换题目 ──
  function goNext() {
    if (currentIdx >= TOTAL) return;
    const val = hiddenRadios[currentIdx].value;
    if (!val && val !== '0') {
      // 检查是否有选中
      const selected = document.querySelector(`#qBlock${currentIdx} .option.selected`);
      if (!selected) { shakeCard(currentIdx); return; }
    }
    if (currentIdx === TOTAL - 1) return;
    transitionTo(currentIdx + 1);
  }

  function goPrev() {
    if (currentIdx <= 0) return;
    transitionTo(currentIdx - 1, true);
  }

  function transitionTo(target, reverse) {
    const oldCard = document.getElementById(`qBlock${currentIdx}`);
    const newCard = document.getElementById(`qBlock${target}`);

    const oldClass = reverse ? 'exit-right' : 'exit-left';
    // Remove active from old
    oldCard.style.opacity = '0';
    oldCard.style.transform = reverse ? 'translateX(40px)' : 'translateX(-40px)';
    oldCard.style.pointerEvents = 'none';
    oldCard.classList.remove('active');

    // Add active to new
    newCard.classList.add('active');
    newCard.style.opacity = '1';
    newCard.style.transform = 'translateX(0)';
    newCard.style.pointerEvents = 'auto';

    currentIdx = target;
    updateUI();
  }

  function shakeCard(idx) {
    const card = document.getElementById(`qBlock${idx}`);
    card.style.animation = 'none';
    card.offsetHeight; // reflow
    card.style.animation = 'shake 0.4s ease';
  }

  function updateUI() {
    document.getElementById('prevBtn').disabled = (currentIdx === 0);
    updateProgress(currentIdx);
    updateDimTags(currentIdx);
  }

  // ── 进度 ──
  function updateProgress(index) {
    const pct = Math.round((index / TOTAL) * 100);
    document.getElementById('progressBar').style.width = `${pct}%`;
    document.getElementById('progressPercent').textContent = `${pct}%`;
    if (index < TOTAL) {
      document.getElementById('progressLabel').textContent = `第 ${index + 1} / ${TOTAL} 题`;
    } else {
      document.getElementById('progressLabel').textContent = `全部完成 ✓`;
    }
  }

  // ── 维度标签 ──
  function updateDimTags(index) {
    const tags = document.querySelectorAll('.dim-tag');
    const dimOrder = ['EI','SN','TF','JP'];
    // 确定当前维度
    let currentDim = null;
    if (index < TOTAL) currentDim = questions[index].dim;

    // 统计已完成各维度题数
    const doneCount = { EI:0, SN:0, TF:0, JP:0 };
    for (let i = 0; i < index; i++) doneCount[questions[i].dim]++;

    tags.forEach((tag, i) => {
      const d = dimOrder[i];
      tag.textContent = `${dimNames[d]} (${doneCount[d]}/8)`;
      tag.classList.remove('current', 'done');
      if (d === currentDim) tag.classList.add('current');
      else if (doneCount[d] > 0) tag.classList.add('done');
    });
  }

  // ── 键盘快捷键 ──
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault(); goNext();
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault(); goPrev();
    }
  });

  // ── 初始更新 ──
  updateUI();

  // ── 摇动动画注入 ──
  const shakeStyle = document.createElement('style');
  shakeStyle.textContent = `
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px); }
      40%     { transform: translateX(8px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }
  `;
  document.head.appendChild(shakeStyle);

  // ── 表单提交 ──
  document.getElementById('testForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('nameInput').value.trim();
    if (!name) return alert('请输入昵称');

    const scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
    const answers = [];
    questions.forEach((q, idx) => {
      const val = hiddenRadios[idx].value;
      const num = (val !== undefined && val !== '') ? parseInt(val) : 0;
      answers.push(num);
      scores[q.dim] += q.rev ? -num : num;
    });

    let type = '';
    type += scores.EI >= 0 ? 'E' : 'I';
    type += scores.SN >= 0 ? 'S' : 'N';
    type += scores.TF >= 0 ? 'T' : 'F';
    type += scores.JP >= 0 ? 'J' : 'P';

    try {
      const res = await fetch(`${API_BASE}/api/collections/results/records`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, mbti_type: type, answers, scores })
      });
      if (!res.ok) throw new Error('保存失败');

      document.getElementById('mbtiType').textContent = type;
      document.getElementById('result').style.display = 'block';
      document.getElementById('testForm').style.display = 'none';
      document.getElementById('progressWrap').style.display = 'none';
    } catch (err) {
      alert('提交失败，请检查网络连接');
    }
  });
</script>
</body>
</html>
