<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBTI 测试结果查询</title>

  <style>
    :root{
      --primary:#6366f1;
      --primary-dark:#4f46e5;
      --cyan:#06b6d4;

      --bg:#f3f4f6;
      --card:#ffffff;

      --text:#111827;
      --sub:#6b7280;

      --border:#e5e7eb;
      --danger:#dc2626;

      --shadow:
        0 10px 25px rgba(0,0,0,.06),
        0 4px 10px rgba(0,0,0,.03);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "PingFang SC",
        "Microsoft YaHei",
        sans-serif;

      background:
        radial-gradient(circle at top left,#eef2ff 0%,transparent 30%),
        radial-gradient(circle at top right,#ecfeff 0%,transparent 30%),
        var(--bg);

      color:var(--text);
      min-height:100vh;
      padding:40px 16px;
    }

    .container{
      max-width:720px;
      margin:auto;
    }

    .hero{
      text-align:center;
      margin-bottom:32px;
    }

    .hero h1{
      font-size:38px;
      font-weight:900;
      margin-bottom:12px;
      letter-spacing:-1px;
    }

    .hero p{
      color:var(--sub);
      line-height:1.8;
      font-size:15px;
    }

    .search-panel{
      background:var(--card);
      border-radius:24px;
      padding:24px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }

    .search-box{
      display:flex;
      gap:12px;
    }

    .search-input{
      flex:1;
      height:54px;

      border:1px solid var(--border);
      border-radius:14px;

      padding:0 18px;

      font-size:16px;
      outline:none;

      transition:.25s;
      background:#fff;
    }

    .search-input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(99,102,241,.12);
    }

    .search-btn{
      border:none;

      height:54px;
      padding:0 28px;

      border-radius:14px;

      background:
        linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );

      color:white;
      font-size:15px;
      font-weight:700;

      cursor:pointer;
      transition:.25s;
    }

    .search-btn:hover{
      transform:translateY(-1px);
      box-shadow:
        0 10px 18px rgba(99,102,241,.25);
    }

    .search-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }

    .loading{
      display:none;

      align-items:center;
      justify-content:center;

      gap:12px;
      margin-top:20px;

      color:var(--sub);
      font-size:14px;
    }

    .spinner{
      width:20px;
      height:20px;

      border:3px solid #ddd;
      border-top-color:var(--primary);

      border-radius:50%;

      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }

    .error{
      display:none;

      margin-top:16px;

      padding:14px 16px;

      background:#fef2f2;
      border:1px solid #fecaca;

      color:var(--danger);

      border-radius:14px;

      font-size:14px;
      line-height:1.6;
    }

    .empty{
      display:none;

      text-align:center;

      background:var(--card);

      border-radius:24px;
      padding:48px 24px;

      box-shadow:var(--shadow);

      margin-top:24px;
    }

    .empty .icon{
      font-size:50px;
      margin-bottom:14px;
    }

    .empty p{
      color:var(--sub);
    }

    .result-card{
      display:none;

      background:var(--card);

      border-radius:28px;
      padding:32px;

      box-shadow:var(--shadow);

      margin-top:24px;

      animation:fadeUp .45s ease;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(14px);
      }
      to{
        opacity:1;
        transform:none;
      }
    }

    .result-top{
      border-bottom:1px solid var(--border);
      padding-bottom:24px;
      margin-bottom:28px;
    }

    .name{
      font-size:18px;
      font-weight:700;
      margin-bottom:20px;
    }

    .type{
      font-size:58px;
      font-weight:900;
      letter-spacing:4px;

      margin-bottom:12px;

      background:
        linear-gradient(
          135deg,
          var(--primary),
          #8b5cf6
        );

      background-clip:text; 
      -webkit-background-clip:text; 
      
      color:transparent;
      -webkit-text-fill-color:transparent;
    }

    .type-desc{
      color:var(--sub);
      line-height:1.8;
      margin-bottom:18px;
    }

    .time{
      color:#9ca3af;
      font-size:14px;
    }

    .section-title{
      font-size:20px;
      font-weight:800;
      margin-bottom:24px;
    }

    .metric{
      margin-bottom:28px;
    }

    .metric-header{
      display:flex;
      justify-content:space-between;

      margin-bottom:10px;

      font-size:14px;
      font-weight:700;
    }

    /* 当某一边胜出时加粗，未胜出时变淡 */
    .label-active {
      font-weight: 800;
      opacity: 1;
    }
    .label-inactive {
      font-weight: 500;
      opacity: 0.5;
    }

    .left-label{
      color:var(--primary);
    }

    .right-label{
      color:var(--cyan);
    }

    .metric-bar{
      position:relative;
      height:16px; /* 稍微加粗一点点，视觉视觉效果更好 */
      background: #f1f5f9; /* 默认浅灰色底 */
      border-radius:999px;
      overflow:hidden;
    }

    /* 中央分界线加深清晰度 */
    .metric-bar::before{
      content:'';
      position:absolute;
      left:50%;
      top:0;
      width:2px;
      height:100%;
      background:rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 2px rgba(0,0,0,0.2);
      z-index:3;
    }

    .metric-fill{
      position:absolute;
      top:0;
      height:100%;
      transition:all .6s cubic-bezier(0.34, 1.56, 0.64, 1); /* 加一点生动的弹性动画 */
    }

    .footer{
      text-align:center;
      margin-top:24px;
    }

    .footer a{
      color:var(--primary);
      text-decoration:none;
      font-weight:600;
    }

    .footer a:hover{
      text-decoration:underline;
    }

    @media(max-width:640px){

      body{
        padding:24px 14px;
      }

      .hero h1{
        font-size:30px;
      }

      .search-box{
        flex-direction:column;
      }

      .search-btn{
        width:100%;
      }

      .result-card{
        padding:24px;
      }

      .type{
        font-size:42px;
      }
    }

    @media(prefers-color-scheme:dark){

      :root{
        --bg:#0f172a;
        --card:#111827;
        --text:#f3f4f6;
        --sub:#94a3b8;
        --border:#1f2937;
      }

      body{
        background:
          radial-gradient(circle at top left,#1e1b4b 0%,transparent 30%),
          radial-gradient(circle at top right,#082f49 0%,transparent 30%),
          var(--bg);
      }

      .search-input{
        background:#0b1220;
        color:white;
      }

      .metric-bar{
        background:#1e293b;
      }

      .metric-bar::before{
        background: #111827;
      }

      .error{
        background:#2a1215;
        border-color:#5f1d24;
      }
    }
  </style>
</head>

<body>

  <main class="container">

    <section class="hero">
      <h1>🔍 查询 MBTI 测试结果</h1>

      <p>
        输入测试时填写的昵称<br>
        查看你的性格维度分析报告
      </p>
    </section>

    <section class="search-panel">

      <div class="search-box">

        <input
          id="queryName"
          class="search-input"
          type="text"
          placeholder="请输入昵称，例如：康康"
        />

        <button
          id="searchBtn"
          class="search-btn"
        >
          查询结果
        </button>

      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>正在查询结果...</span>
      </div>

      <div class="error" id="errorBox"></div>

    </section>

    <section class="empty" id="emptyBox">
      <div class="icon">🔎</div>
      <p>没有找到该昵称的测试记录</p>
    </section>

    <section class="result-card" id="resultCard">

      <div class="result-top">

        <div class="name">
          👤 <span id="rName"></span>
        </div>

        <div class="type" id="rType"></div>

        <div class="type-desc" id="rDesc"></div>

        <div class="time">
          测试时间：
          <span id="rTime"></span>
        </div>

      </div>

      <div class="section-title">
        📊 四大人格维度分析
      </div>

      <div id="metrics"></div>

    </section>

    <div class="footer">
      <a href="/">← 返回测试首页</a>
    </div>

  </main>

  <script>
    const API_BASE = window.location.origin;
    const cache = new Map();
    let searching = false;

    const descriptions = {
      INTJ:"战略家型人格，擅长规划与独立思考。",
      INTP:"逻辑学家型人格，理性且富有创造力。",
      ENTJ:"指挥官型人格，果断且领导力强。",
      ENTP:"辩论家型人格，思维敏捷且充满好奇。",
      INFJ:"提倡者型人格，理想主义且洞察力强。",
      INFP:"调停者型人格，温柔且富有同理心。",
      ENFJ:"主人公型人格，富有感染力与责任感。",
      ENFP:"竞选者型人格，热情、自由、富有创意。",
      ISTJ:"物流师型人格，可靠且重视秩序。",
      ISFJ:"守卫者型人格，细致且乐于助人。",
      ESTJ:"总经理型人格，执行力与组织力强。",
      ESFJ:"执政官型人格，热情并关注他人。",
      ISTP:"鉴赏家型人格，冷静且擅长实践。",
      ISFP:"探险家型人格，感性且热爱自由。",
      ESTP:"企业家型人格，行动力强且喜欢挑战。",
      ESFP:"表演者型人格，活泼并享受当下。"
    };

    const metricsConfig = [
      { key:"EI", left:"外向 (E)", right:"内向 (I)" },
      { key:"SN", left:"感觉 (S)", right:"直觉 (N)" },
      { key:"TF", left:"思考 (T)", right:"情感 (F)" },
      { key:"JP", left:"判断 (J)", right:"感知 (P)" }
    ];

    const queryInput = document.getElementById("queryName");
    const searchBtn = document.getElementById("searchBtn");
    const loading = document.getElementById("loading");
    const errorBox = document.getElementById("errorBox");
    const emptyBox = document.getElementById("emptyBox");
    const resultCard = document.getElementById("resultCard");

    queryInput.addEventListener("keydown", e => {
      if(e.key === "Enter") search();
    });

    searchBtn.addEventListener("click", search);

    async function search(){
      if(searching) return;
      const rawName = queryInput.value.trim();
      const name = sanitize(rawName);
      resetUI();

      if(!name){
        showError("请输入昵称");
        return;
      }

      if(cache.has(name)){
        render(cache.get(name));
        return;
      }

      searching = true;
      searchBtn.disabled = true;
      loading.style.display = "flex";

      try{
        const filter = encodeURIComponent(`name="${name}"`);
        const url = `${API_BASE}/api/collections/results/records?filter=${filter}&sort=-created&perPage=1`;
        const res = await fetch(url);

        if(!res.ok) throw new Error("服务器错误");

        const data = await res.json();

        if(!data.items || data.items.length === 0){
          emptyBox.style.display = "block";
          return;
        }

        const record = data.items[0];
        cache.set(name, record);
        render(record);

      }catch(err){
        console.error(err);
        showError("查询失败，请检查网络或稍后重试");
      }finally{
        searching = false;
        searchBtn.disabled = false;
        loading.style.display = "none";
      }
    }

    function render(record){
      document.getElementById("rName").textContent = record.name || "-";
      document.getElementById("rType").textContent = record.mbti_type || "----";
      document.getElementById("rDesc").textContent = descriptions[record.mbti_type] || "暂无人格描述";
      document.getElementById("rTime").textContent = formatDate(record.created);

      const scores = record.scores || { EI:0, SN:0, TF:0, JP:0 };
      const metricsEl = document.getElementById("metrics");
      metricsEl.innerHTML = "";

      metricsConfig.forEach(metric => {
        const score = scores[metric.key] || 0;
        metricsEl.appendChild(createMetric(score, metric.left, metric.right));
      });

      resultCard.style.display = "block";
    }

    // 创建维度条
    function createMetric(score, leftText, rightText){
      const wrapper = document.createElement("div");
      wrapper.className = "metric";

      // score: -16 到 +16。转换为左侧占比 (0% - 100%)
      // 这里的逻辑：若 score = +16, 则 leftPercent = 100% (极度偏向左边)
      // 若 score = -16, 则 leftPercent = 0% (极度偏向右边)
      const leftPercent = Math.round(((score + 16) / 32) * 100);
      const rightPercent = 100 - leftPercent;

      // 视觉样式提升：高亮胜出的一方，淡化未胜出的一方
      const leftClass = leftPercent >= 50 ? 'label-active' : 'label-inactive';
      const rightClass = rightPercent > 50 ? 'label-active' : 'label-inactive';

      const fillHTML = createFill(score, leftPercent);

      wrapper.innerHTML = `
        <div class="metric-header">
          <span class="left-label ${leftClass}">
            ${leftText} (${leftPercent}%)
          </span>
          <span class="right-label ${rightClass}">
            (${rightPercent}%) ${rightText}
          </span>
        </div>
        <div class="metric-bar">
          ${fillHTML}
        </div>
      `;

      return wrapper;
    }

    // 完美修正方向：中间向两边增长的进度条
    function createFill(score, leftPercent){

      // 情况 1：偏向左侧 (score > 0)，例如外向 (E) 占比大
      // 视觉上：彩色条应该出现在左半边，从 leftPercent 一直延伸到 50% 的中心点
      if(score > 0){
        const width = leftPercent - 50;
        return `
          <div
            class="metric-fill"
            style="
              left: ${50 - width}%; /* 或者直接写 leftPercent，但这里用 50-width 更直观 */
              width: ${width}%;
              background: var(--primary); /* 左侧专属颜色（靛蓝） */
            "
          ></div>
        `;
      }

      // 情况 2：偏向右侧 (score < 0)，例如内向 (I) 占比大
      // 视觉上：彩色条应该出现在右半边，从 50% 的中心点一直向右延伸到计算出的位置
      if(score < 0){
        const width = 50 - leftPercent;
        return `
          <div
            class="metric-fill"
            style="
              left: 50%;
              width: ${width}%;
              background: var(--cyan); /* 右侧专属颜色（青色） */
            "
          ></div>
        `;
      }

      // 情况 3：正好等于 0 (50% / 50%)，不显示任何颜色条
      return ''; 
    }

    function sanitize(str){
      return str.replace(/[<>]/g, "");
    }

    function showError(msg){
      errorBox.textContent = msg;
      errorBox.style.display = "block";
    }

    function resetUI(){
      errorBox.style.display = "none";
      emptyBox.style.display = "none";
      resultCard.style.display = "none";
    }

    function formatDate(dateString){
      try{
        return new Date(dateString).toLocaleString("zh-CN");
      }catch{
        return dateString;
      }
    }
  </script>

</body>
</html>
